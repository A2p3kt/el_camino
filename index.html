<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Explore the historic La Rábida trail — discover monuments, viewpoints, and the story of Columbus's journey.">
    <meta name="theme-color" content="#2b402d">
    <title>El Camino — La Rábida Explorer</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
    
    <style>
        :root {
            --primary: #3d5a40;
            --primary-dark: #2b402d;
            --accent: #d4a373;
            --accent-soft: #faedcd;
            --highlight: #f59e0b;
            --surface: #ffffff;
            --border: #e9edc9;
            --text: #2c2c2c;
            --text-secondary: #5a5a5a;
            --ease: cubic-bezier(0.32, 0.72, 0, 1);
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --safe-left: env(safe-area-inset-left, 0px);
            --safe-right: env(safe-area-inset-right, 0px);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
            display: flex; height: 100vh; height: 100dvh;
            overflow: hidden; color: var(--text);
            background: #f4ebd8;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
        }

        /* ─────── MAP ─────── */
        #map { height: 100%; width: 100%; z-index: 10; }

        /* ─────── FLOATING HEADER ─────── */
        .app-header {
            position: absolute;
            top: calc(12px + var(--safe-top));
            left: calc(12px + var(--safe-left));
            right: auto;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(16px) saturate(1.8);
            -webkit-backdrop-filter: blur(16px) saturate(1.8);
            padding: 10px 16px;
            border-radius: 14px;
            box-shadow: 0 2px 16px rgba(0,0,0,0.1), 0 0 0 1px rgba(255,255,255,0.6);
            display: flex; align-items: center; gap: 10px;
            max-width: 260px;
            transition: opacity 0.3s ease;
        }
        .app-header .header-icon {
            width: 32px; height: 32px;
            background: var(--primary);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .app-header .header-icon svg {
            width: 18px; height: 18px; fill: white;
        }
        .app-header h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.05rem; font-weight: 800;
            color: var(--primary-dark); letter-spacing: -0.02em;
            line-height: 1.2;
        }
        .app-header p {
            font-size: 0.65rem; color: var(--text-secondary); font-weight: 500;
            margin-top: 1px; letter-spacing: 0.02em;
        }

        @media (min-width: 768px) {
            .app-header {
                top: calc(24px + var(--safe-top));
                left: calc(24px + var(--safe-left));
                padding: 12px 18px;
                max-width: 280px;
            }
        }
        @media (max-width: 374px) {
            .app-header { padding: 8px 12px; max-width: 220px; }
            .app-header h1 { font-size: 0.95rem; }
        }

        /* ─────── BOTTOM SHEET ─────── */
        #bottom-sheet {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: var(--surface);
            border-radius: 20px 20px 0 0;
            box-shadow: 0 -4px 30px rgba(0,0,0,0.18);
            z-index: 1000;
            transform: translateY(105%);
            transition: transform 0.45s var(--ease);
            display: flex; flex-direction: column;
            max-height: 75dvh;
            padding-bottom: var(--safe-bottom);
            will-change: transform;
        }
        #bottom-sheet.active {
            transform: translateY(0);
        }
        #bottom-sheet.dragging {
            transition: none;
        }

        @media (min-width: 768px) {
            #bottom-sheet {
                left: calc(24px + var(--safe-left));
                bottom: calc(24px + var(--safe-bottom));
                width: 380px; right: auto;
                border-radius: 20px;
                max-height: calc(100dvh - 120px);
                padding-bottom: 0;
                box-shadow: 0 8px 40px rgba(0,0,0,0.15), 0 0 0 1px rgba(0,0,0,0.04);
            }
        }

        .drag-handle {
            display: flex; align-items: center; justify-content: center;
            padding: 12px 0 4px;
            cursor: grab;
            touch-action: none;
        }
        .drag-handle:active { cursor: grabbing; }
        .drag-indicator {
            width: 36px; height: 4px;
            background: #d1d5db;
            border-radius: 10px;
        }
        @media (min-width: 768px) { .drag-handle { display: none; } }

        .sheet-content {
            overflow-y: auto;
            padding-bottom: 20px;
            overscroll-behavior: contain;
            -webkit-overflow-scrolling: touch;
        }
        .sheet-content::-webkit-scrollbar { width: 0; display: none; }

        /* ─── Detail Image ─── */
        .detail-img-wrap {
            position: relative;
            margin: 8px 14px 0;
            border-radius: 14px;
            overflow: hidden;
            background: linear-gradient(135deg, #e9edc9 0%, #f4ebd8 100%);
            min-height: 170px;
        }
        .detail-img-wrap img {
            width: 100%; height: 180px; object-fit: cover;
            display: block;
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        .detail-img-wrap img.loaded {
            opacity: 1;
        }

        /* Shimmer skeleton */
        .detail-img-wrap::before {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.5) 50%, transparent 100%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            z-index: 1;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .detail-img-wrap.loaded::before { opacity: 0; }

        @keyframes shimmer {
            from { background-position: 200% 0; }
            to { background-position: -200% 0; }
        }

        .close-btn {
            position: absolute; top: 10px; right: 10px;
            border: none; background: rgba(0,0,0,0.45);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            color: white; width: 44px; height: 44px; border-radius: 50%;
            cursor: pointer; z-index: 10; display: flex;
            align-items: center; justify-content: center;
            transition: background 0.2s, transform 0.15s;
            font-size: 16px;
        }
        .close-btn:hover { background: rgba(0,0,0,0.7); }
        .close-btn:active { transform: scale(0.9); background: rgba(0,0,0,0.8); }

        /* ─── Detail Body ─── */
        .detail-body { padding: 14px 18px 0; }
        .detail-body .detail-type {
            font-family: 'Montserrat', sans-serif;
            color: var(--accent); font-weight: 700;
            font-size: 0.65rem; text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        .detail-body h3 {
            font-family: 'Montserrat', sans-serif;
            margin: 5px 0 8px; font-size: 1.25rem;
            line-height: 1.2; font-weight: 800; color: var(--primary-dark);
        }
        .detail-body .detail-desc {
            font-size: 0.9rem; color: var(--text-secondary); line-height: 1.65;
        }

        /* Staggered entrance */
        .sheet-content .detail-type,
        .sheet-content h3,
        .sheet-content .detail-desc,
        .sheet-content .visit-btn {
            opacity: 0; transform: translateY(8px);
            transition: opacity 0.35s ease, transform 0.35s ease;
        }
        #bottom-sheet.active .detail-type   { opacity: 1; transform: none; transition-delay: 0.15s; }
        #bottom-sheet.active h3             { opacity: 1; transform: none; transition-delay: 0.2s; }
        #bottom-sheet.active .detail-desc   { opacity: 1; transform: none; transition-delay: 0.25s; }
        #bottom-sheet.active .visit-btn     { opacity: 1; transform: none; transition-delay: 0.3s; }

        /* ─── Visit Button ─── */
        .visit-btn {
            display: block;
            width: 100%;
            margin-top: 16px;
            padding: 14px 0;
            background: var(--primary);
            color: white;
            text-align: center;
            text-decoration: none;
            border-radius: 12px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 0.01em;
            transition: all 0.2s var(--ease);
            box-shadow: 0 4px 14px rgba(61, 90, 64, 0.25);
            -webkit-tap-highlight-color: transparent;
        }
        .visit-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(61, 90, 64, 0.35);
        }
        .visit-btn:active {
            transform: scale(0.97) translateY(0);
            box-shadow: 0 2px 8px rgba(61, 90, 64, 0.2);
        }

        .monument-link {
            color: var(--primary);
            font-weight: 600;
            cursor: pointer;
            border-bottom: 1.5px solid var(--accent);
            transition: background 0.2s;
            padding: 0 2px;
        }
        .monument-link:hover, .monument-link:active {
            background: var(--accent-soft);
            border-radius: 2px;
        }

        /* ─────── MAP UI & ICONS ─────── */
        .leaflet-control-zoom {
            border-radius: 12px !important; overflow: hidden; border: none !important;
            box-shadow: 0 2px 12px rgba(0,0,0,0.12) !important;
            margin-right: calc(12px + var(--safe-right)) !important;
            margin-top: calc(12px + var(--safe-top)) !important;
        }
        .leaflet-control-zoom a {
            width: 42px !important; height: 42px !important;
            line-height: 42px !important; border: none !important;
            color: var(--text) !important; font-size: 17px !important;
            background: rgba(255,255,255,0.9) !important;
        }
        .leaflet-control-zoom a:first-child {
            border-bottom: 1px solid #eee !important;
        }

        /* Attribution – tuck it away */
        .leaflet-control-attribution {
            font-size: 9px !important;
            background: rgba(255,255,255,0.5) !important;
            backdrop-filter: blur(4px) !important;
            padding: 2px 6px !important;
            border-radius: 6px 0 0 0 !important;
        }
        .leaflet-control-attribution a { color: var(--text-secondary) !important; }

        .custom-pin {
            color: var(--primary);
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.35));
            transition: transform 0.25s var(--ease);
            transform-origin: bottom center;
            cursor: pointer;
        }
        .custom-pin:hover {
            transform: scale(1.2) translateY(-4px);
        }
        .custom-pin svg {
            width: 100%; height: 100%;
            fill: currentColor;
            stroke: white;
            stroke-width: 1.5px;
        }
        
        .faded-cone-step {
            filter: blur(4px);
            animation: pulseCone 2.5s infinite alternate;
        }
        @keyframes pulseCone {
            from { opacity: 0.8; }
            to { opacity: 1; }
        }

        .you-are-here-label {
            background: var(--primary-dark);
            color: white;
            border: none;
            border-radius: 20px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 0.7rem;
            padding: 5px 12px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.3);
            text-shadow: none;
            white-space: nowrap;
        }
        .you-are-here-label::before {
            border-top-color: var(--primary-dark);
        }
    </style>
</head>
<body>

<div class="app-header" id="app-header">
    <div class="header-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 010-5 2.5 2.5 0 010 5z"/></svg>
    </div>
    <div>
        <h1>El Camino</h1>
        <p>La Rábida Explorer</p>
    </div>
</div>

<div id="map" aria-label="La Rabida route map"></div>

<div id="bottom-sheet">
    <div class="drag-handle" id="drag-handle">
        <div class="drag-indicator"></div>
    </div>
    <div class="sheet-content" id="sheet-content">
        <div class="detail-img-wrap" id="img-wrap">
            <button class="close-btn" onclick="hideDetails()" aria-label="Close">✕</button>
            <img id="d-img" alt="Location image">
        </div>
        <div class="detail-body">
            <div id="d-type" class="detail-type"></div>
            <h3 id="d-title"></h3>
            <div id="d-desc" class="detail-desc"></div>
            <a href="#" id="d-visit-btn" class="visit-btn">Visit Monument Page →</a>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<script>
    let map;
    let mapData = { route: [], landmarks: [], stops: [] };
    let viewConeLayer = null;
    let markersMap = {}; 
    let activeTooltip = null;
    
    const defaultLandmarkStyle = { color: '#8b0000', fillColor: '#cc0000', fillOpacity: 0.4, weight: 2 };
    const activeLandmarkStyle = { color: '#b45309', fillColor: '#f59e0b', fillOpacity: 0.8, weight: 3 };

    const pinSvg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 010-5 2.5 2.5 0 010 5z"/></svg>`;

    window.triggerLocation = (id) => {
        const target = [...mapData.landmarks, ...mapData.stops].find(item => item.id === id);
        if (target) selectLocation(target);
    };

    document.addEventListener('DOMContentLoaded', () => {
        initMap();
        loadMapData();
        initDragDismiss();
        window.addEventListener('hashchange', checkURLHash);
    });

    function initMap() {
        map = L.map('map', { zoomControl: false }).setView([37.208, -6.922], 15);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            maxZoom: 19, attribution: 'Tiles &copy; Esri'
        }).addTo(map);
        L.control.zoom({ position: 'topright' }).addTo(map);
    }

    async function loadMapData() {
        try {
            const response = await fetch('map-data.json');
            if (!response.ok) throw new Error('Failed to load');
            mapData = await response.json();
            
            drawRoute(mapData.route);
            drawLandmarks(mapData.landmarks);
            drawStops(mapData.stops);
            
            const allLatLngs = [
                ...mapData.route, 
                ...mapData.landmarks.map(l => [l.lat, l.lng])
            ];
            
            if (allLatLngs.length > 0) {
                const mapBounds = L.latLngBounds(allLatLngs);
                map.fitBounds(mapBounds, {
                    paddingTopLeft: [20, 90],
                    paddingBottomRight: [20, 20],
                    maxZoom: 16
                });
            }

            checkURLHash();
        } catch (error) {
            console.error("Map data failed to load", error);
        }
    }

    function checkURLHash() {
        const hash = window.location.hash.replace('#', '');
        if (hash) {
            const target = [...mapData.landmarks, ...mapData.stops].find(item => item.id === hash);
            if (target) selectLocation(target, false);
        } else {
            hideDetails();
        }
    }

    function drawRoute(routeCoords) {
        if (!routeCoords || routeCoords.length < 2) return;
        L.polyline(routeCoords, { color: '#1a1a1a', weight: 8, opacity: 0.4 }).addTo(map);
        L.polyline(routeCoords, { color: '#d4a373', weight: 4, dashArray: '10, 8', opacity: 0.9, lineCap: 'round' }).addTo(map);
    }

    function drawLandmarks(landmarks) {
        landmarks.forEach(lm => {
            const circle = L.circle([lm.lat, lm.lng], { ...defaultLandmarkStyle, radius: lm.radius || 40 }).addTo(map);
            circle.on('click', () => selectLocation(lm));
            markersMap[lm.id] = { layer: circle, data: lm, type: 'landmark' };
        });
    }

    function drawStops(stops) {
        stops.forEach(stop => {
            const icon = L.divIcon({ 
                className: 'custom-pin', 
                html: pinSvg, 
                iconSize: [42, 42], 
                iconAnchor: [21, 40] 
            });
            const marker = L.marker([stop.lat, stop.lng], { icon: icon }).addTo(map);
            marker.on('click', () => selectLocation(stop));
            markersMap[stop.id] = { layer: marker, data: stop, type: 'stop' };
        });
    }

    function drawFadedCone(coneCoords) {
        if (!coneCoords || coneCoords.length !== 3) return null;
        const layers = [];
        const steps = 5; 
        
        for (let i = steps; i > 0; i--) {
            const ratio = i / steps;
            const p1 = [
                coneCoords[0][0] + (coneCoords[1][0] - coneCoords[0][0]) * ratio,
                coneCoords[0][1] + (coneCoords[1][1] - coneCoords[0][1]) * ratio
            ];
            const p2 = [
                coneCoords[0][0] + (coneCoords[2][0] - coneCoords[0][0]) * ratio,
                coneCoords[0][1] + (coneCoords[2][1] - coneCoords[0][1]) * ratio
            ];
            const opacity = 0.5 - (ratio * 0.45); 
            
            // Critical fix: interactive: false ensures clicks pass through to the landmarks underneath
            layers.push(L.polygon([coneCoords[0], p1, p2], {
                color: 'transparent', fillColor: '#faedcd', fillOpacity: opacity, className: 'faded-cone-step', interactive: false
            }));
        }
        return L.layerGroup(layers);
    }

    function selectLocation(item, updateUrl = true) {
        if (viewConeLayer) map.removeLayer(viewConeLayer);
        
        if (activeTooltip) {
            map.removeLayer(activeTooltip);
            activeTooltip = null;
        }
        
        // Reset landmarks to default red
        mapData.landmarks.forEach(lm => {
            if (markersMap[lm.id]) markersMap[lm.id].layer.setStyle(defaultLandmarkStyle);
        });

        const isStop = !!item.viewCone;
        const isMobile = window.innerWidth < 768;

        // Auto-framing
        let bounds = L.latLngBounds([item.lat, item.lng]);

        if (isStop) {
            if (item.viewCone) {
                item.viewCone.forEach(coord => bounds.extend(coord));
            }
            if (item.visibleLandmarks) {
                item.visibleLandmarks.forEach(targetId => {
                    if (markersMap[targetId]) {
                        const lmData = markersMap[targetId].data;
                        bounds.extend([lmData.lat, lmData.lng]);
                    }
                });
            }
        } else {
            const pad = (item.radius || 40) / 111320; 
            bounds.extend([item.lat + pad, item.lng + pad]);
            bounds.extend([item.lat - pad, item.lng - pad]);
        }

        const padTL = isMobile ? [20, 80] : [420, 90]; 
        const padBR = isMobile ? [20, window.innerHeight * 0.42] : [40, 40]; 

        map.flyToBounds(bounds, {
            paddingTopLeft: padTL,
            paddingBottomRight: padBR,
            duration: 1.0,
            maxZoom: 18
        });

        if (updateUrl) {
            window.history.pushState(null, '', '#' + item.id);
        }

        // Draw Cone & Highlight
        if (isStop) {
            if (item.viewCone) {
                viewConeLayer = drawFadedCone(item.viewCone);
                if (viewConeLayer) viewConeLayer.addTo(map);
            }
            if (item.visibleLandmarks) {
                item.visibleLandmarks.forEach(targetId => {
                    if (markersMap[targetId]) {
                        markersMap[targetId].layer.setStyle(activeLandmarkStyle);
                        markersMap[targetId].layer.bringToFront();
                    }
                });
            }
            
            activeTooltip = L.tooltip({
                permanent: true,
                direction: 'top',
                className: 'you-are-here-label',
                offset: [0, -36] 
            })
            .setLatLng([item.lat, item.lng])
            .setContent("📍 You are here")
            .addTo(map);
        }

        // Update sheet UI
        const sheet = document.getElementById('bottom-sheet');
        const imgEl = document.getElementById('d-img');
        const imgWrap = document.getElementById('img-wrap');

        // Reset image loading state
        imgEl.classList.remove('loaded');
        imgWrap.classList.remove('loaded');

        imgEl.onload = () => {
            imgEl.classList.add('loaded');
            imgWrap.classList.add('loaded');
        };
        imgEl.onerror = () => {
            imgWrap.classList.add('loaded');
        };

        sheet.classList.add('active');
        document.getElementById('d-type').textContent = isStop ? 'Viewpoint' : 'Landmark';
        document.getElementById('d-title').textContent = item.name;
        document.getElementById('d-desc').innerHTML = item.desc;
        imgEl.src = item.img || '';

        // Scroll sheet content to top
        document.getElementById('sheet-content').scrollTop = 0;

        // Visit button logic
        const visitBtn = document.getElementById('d-visit-btn');
        if (!isStop && item.id) {
            visitBtn.href = `monument.html?id=${item.id}`;
            visitBtn.style.display = 'block';
        } else {
            visitBtn.style.display = 'none';
        }
    }

    function hideDetails() {
        document.getElementById('bottom-sheet').classList.remove('active');
        
        if (viewConeLayer) map.removeLayer(viewConeLayer);
        
        if (activeTooltip) {
            map.removeLayer(activeTooltip);
            activeTooltip = null;
        }
        
        mapData.landmarks.forEach(lm => {
            if (markersMap[lm.id]) markersMap[lm.id].layer.setStyle(defaultLandmarkStyle);
        });

        window.history.pushState(null, '', window.location.pathname);
    }

    // ─── Touch Drag to Dismiss ───
    function initDragDismiss() {
        const sheet = document.getElementById('bottom-sheet');
        const handle = document.getElementById('drag-handle');
        let startY = 0, currentY = 0, isDragging = false;

        handle.addEventListener('touchstart', (e) => {
            startY = e.touches[0].clientY;
            isDragging = true;
            sheet.classList.add('dragging');
        }, { passive: true });

        handle.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            currentY = e.touches[0].clientY;
            const deltaY = Math.max(0, currentY - startY);
            sheet.style.transform = `translateY(${deltaY}px)`;
        }, { passive: true });

        handle.addEventListener('touchend', () => {
            if (!isDragging) return;
            isDragging = false;
            sheet.classList.remove('dragging');
            sheet.style.transform = '';
            const deltaY = currentY - startY;
            if (deltaY > 100) {
                hideDetails();
            } else {
                sheet.classList.add('active');
            }
            currentY = 0;
        });
    }
</script>
</body>
</html>
